<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>User List</title>
        <link rel="stylesheet" href="/html/style.css" />
    </head>

    <body>
        <div class="user-listing">
            <h1>Membership List</h1>
            <form action="/viewmembership" method="get" style="margin-bottom: 20px;">
                <input type="text" name="search" th:value="${searchQuery}" placeholder="Search by username, first name, or last name" ; />
                <button type="submit" style="padding: 5px 10px;">Search</button>
                <a href="viewmembership.html" style="margin-left: 10px;">Clear</a>
            </form>
            <table>
                <tr>
                    <th>User ID</th>
                    <th>Username</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Signup Date</th>
                </tr>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.firstName}"></td>
                    <td th:text="${user.lastName}"></td>
                    <td th:text="${user.signupDate != null ? #temporals.format(user.signupDate, 'MM/dd/yyyy') : 'N/A'}"></td>
                </tr>
            </table>
        </div>
    </body>
</html>
