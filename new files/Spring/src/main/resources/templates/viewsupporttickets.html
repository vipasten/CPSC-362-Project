<!DOCTYPE html>
<!-- Thymeleaf namespace declaration - allows use of th: attributes for server-side rendering -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Support Tickets</title>
        <!-- Link to the shared stylesheet for the whole site -->
        <!-- Uses absolute path /html/style.css since this page is served by Spring Boot -->
        <link rel="stylesheet" href="/html/style.css" />
    </head>

    <body>
        <div class="support-tickets-container">
            <h1>Support Tickets</h1>

            <!-- Search/filter form - submits a GET request to /viewsupporttickets -->
            <!-- TODO: Need to build the /viewsupporttickets backend endpoint -->
            <!-- and pass support ticket data to this template similar to /viewmembership -->
            <form action="/viewsupporttickets" method="get" style="margin-bottom: 20px;">

                <!-- Submit button to trigger the search/refresh -->
                <button type="submit" style="padding: 5px 10px;">Search</button>

                <!-- Clear link resets the view back to showing all tickets -->
                <a href="viewsupporttickets.html" style="margin-left: 10px;">Clear</a>

            </form>

            <!-- TODO: Should add a table here similar to viewmembership.html -->
            <!-- using th:each to loop through support tickets returned from the backend -->
            <!-- Suggested columns: Ticket ID, First Name, Last Name, Subject, Details, Date Submitted -->

        </div>
    </body>
</html>
