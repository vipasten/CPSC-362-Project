<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund Request</title>
    <!-- Link to the shared stylesheet for the whole site -->
    <link rel="stylesheet" href="../style.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding: 30px;
            margin: 0;
        }

        /* Dark rounded box containing the refund form */
        .forms {
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            margin: 30px auto;
            text-align: left;
        }

        .forms h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
        }

        /* Label styling for each form field */
        .forms label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }

        /* Dark styled input, textarea, and select fields */
        .forms input, .forms textarea, .forms select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        /* Textarea height for the details field */
        .forms textarea {
            height: 100px;
            resize: vertical;
        }

        /* Dark background for dropdown options */
        .forms select option {
            background-color: #1a1a1a;
            color: white;
        }

        /* Red submit button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background: #ab191ecd;
            color: white;
            margin-top: 10px;
        }

        .submit-btn:hover { background: #8a1015; }
        .submit-btn:disabled { background: rgba(255,255,255,0.2); cursor: not-allowed; }

        /* Transparent go back button */
        .back-btn {
            margin-top: 12px;
            padding: 12px 28px;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 16px;
            cursor: pointer;
            background: transparent;
            color: white;
            width: 100%;
        }

        .back-btn:hover { background: rgba(255,255,255,0.08); }

        /* Error message shown if submission fails */
        .error-msg {
            color: #e05252;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Navigation bar -->
    <div class="listing">
        <button>
            <a href="../index.html"><img src="../images/home-icon.svg" alt="Home Icon" class="icon"></a>
        </button>
        <button>
            <a href="viewtimes.html"><img src="../images/movie-icon.svg" alt="View Times Icon" class="icon"></a>
        </button>
        <button>
            <a href="supportticket.html"><img src="../images/support-icon.svg" alt="Support Icon" class="icon"></a>
        </button>
    </div>

    <h1>Request thy Refund</h1>
    <p>Fill out the form below and our super amazing and amazingly super team will review your request.</p>

    <div class="forms">
        <h1>Refund thy Request Form</h1>

        <div>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" placeholder="John" required>

            <label for="lname">Last Name:</label>
            <input type="text" id="lname" placeholder="Doe" required>

            <label for="orderNumber">Order Number:</label>
            <input type="text" id="orderNumber" placeholder="ORD-123456" required>

            <label for="movie">Movie:</label>
            <input type="text" id="movie" placeholder="e.g. Fart Wars" required>

            <label for="reason">Reason for Refund:</label>
            <select id="reason" required>
                <option value="" disabled selected>Select a reason</option>
                <option value="Wrong seats">Wrong seats booked</option>
                <option value="Duplicate purchase">Duplicate purchase</option>
                <option value="Event cancelled">Event cancelled</option>
                <option value="Unable to attend">Unable to attend</option>
                <option value="Other">Other</option>
            </select>

            <label for="details">Additional Details:</label>
            <textarea id="details" placeholder="Provide any extra details here..."></textarea>

            <p class="error-msg" id="errorMsg">Something went wrong. Please try again!</p>

            <button class="submit-btn" id="submitBtn" onclick="submitRefund()">Submit Refund Request</button>
            <button class="back-btn" type="button" onclick="history.back()">Go Back</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById("orderNumber").value = params.get("orderNumber") || "";
        document.getElementById("movie").value = params.get("movie") || "";

        async function submitRefund() {
            const fname = document.getElementById("fname").value.trim();
            const lname = document.getElementById("lname").value.trim();
            const orderNumber = document.getElementById("orderNumber").value.trim();
            const movie = document.getElementById("movie").value.trim();
            const reason = document.getElementById("reason").value;
            const details = document.getElementById("details").value.trim();
            const errorMsg = document.getElementById("errorMsg");
            const submitBtn = document.getElementById("submitBtn");

            // Validate all required fields are filled in
            if (!fname || !lname || !orderNumber || !movie || !reason) {
                alert("Please fill in all required fields!");
                return;
            }

            // Generate a unique REF number for this refund request
            const refNumber = "REF-" + Math.floor(Math.random() * 900000 + 100000);

            // Disable button to prevent double submission
            submitBtn.disabled = true;
            submitBtn.textContent = "Submitting...";

            try {
                // Send the refund request to the backend to save in the database
                const response = await fetch("/api/refunds/submit", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({
                        refNumber, firstName: fname, lastName: lname,
                        orderNumber, movie, reason, details
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // On success redirect to confirmation page with all details
                    window.location.href = "refundconfirmation.html?" +
                        "ref=" + encodeURIComponent(refNumber) +
                        "&fname=" + encodeURIComponent(fname) +
                        "&lname=" + encodeURIComponent(lname) +
                        "&orderNumber=" + encodeURIComponent(orderNumber) +
                        "&movie=" + encodeURIComponent(movie) +
                        "&reason=" + encodeURIComponent(reason) +
                        "&details=" + encodeURIComponent(details);
                } else {
                    // Show error message if backend returns failure
                    errorMsg.style.display = "block";
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Submit Refund Request";
                }
            } catch (error) {
                // Show error if the fetch call itself fails
                errorMsg.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Refund Request";
            }
        }
    </script>

</body>
</html>
