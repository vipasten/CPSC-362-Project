<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Promo Codes</title>
    <link rel="stylesheet" href="/html/style.css" />
    <style>
        body { color: white; text-align: center; }
        .promo-box {
            max-width: 520px;
            margin: 40px auto;
            background: rgba(255,255,255,0.08);
            padding: 24px;
            border-radius: 12px;
            text-align: left;
        }
        .promo-box h2 { margin-top: 0; text-align: center; }
        .promo-box label { display:block; margin: 10px 0 6px; }
        .promo-box input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .promo-box button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #ab191ecd;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .status { margin-top: 12px; text-align:center; color: #ffe96b; }
        .back-link { display:block; margin-top: 16px; text-align:center; color: #ffe96b; }
    </style>
</head>
<body>
    <div class="promo-box">
        <h2>Create Promo Code</h2>
        <form method="post" action="/admin/promos/create">
            <label for="code">Promo Code</label>
            <input id="code" name="code" type="text" placeholder="SAVE10" required />

            <label for="percentOff">Percent Off (1-90)</label>
            <input id="percentOff" name="percentOff" type="number" min="1" max="90" placeholder="10" required />

            <button type="submit">Save Promo Code</button>
        </form>

        <p class="status" id="statusText"></p>
        <a class="back-link" href="/html/pages/adminhomepage.html">Back to Admin Home</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get("status");
        if (status === "created") {
            document.getElementById("statusText").textContent = "Promo code saved.";
        } else if (status === "invalid") {
            document.getElementById("statusText").textContent = "Invalid input. Use code + 1-90% value.";
        }
    </script>
</body>
</html>
